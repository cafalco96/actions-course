name: First Workflow
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
      - name: Run file
        run: node main.js
